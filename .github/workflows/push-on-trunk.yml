name: Push on Trunk

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  gitlab-sync:
    name: GitLab Sync
    uses: AGES-RFID/cicd/.github/workflows/gitlab-sync.yml@main
    secrets:
      gitlab_token: ${{ secrets.GITLAB_TOKEN }}

  validate:
    name: CI
    uses: AGES-RFID/cicd/.github/workflows/ci-dotnet.yml@main
    with:
      dotnet-version: "10.0.x"
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-staging:
    name: CD Staging
    needs: [validate]
    uses: AGES-RFID/cicd/.github/workflows/cd-lambda.yml@main
    with:
      environment: "staging"
      version: ${{ github.sha }}
      role-to-assume: "arn:aws:iam::507099298238:role/ages-rfid-cicd-role"
    secrets: inherit
