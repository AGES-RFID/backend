name: Tag Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: read

jobs:
  gitlab-sync:
    name: GitLab Sync
    uses: AGES-RFID/cicd/.github/workflows/gitlab-sync.yml@main
    secrets:
      gitlab_token: ${{ secrets.GITLAB_TOKEN }}

  generate-release:
    name: Release Notes
    uses: AGES-RFID/cicd/.github/workflows/tag-release.yml@main

  validate:
    name: CI
    uses: AGES-RFID/cicd/.github/workflows/ci-dotnet.yml@main
    with:
      dotnet-version: "10.0.x"
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-production:
    name: CD Production
    needs: [validate, generate-release]
    uses: AGES-RFID/cicd/.github/workflows/cd-lambda.yml@main
    with:
      environment: "production"
      version: ${{ github.ref_name }}
      role-to-assume: "arn:aws:iam::507099298238:role/ages-rfid-cicd-role"
    secrets: inherit
